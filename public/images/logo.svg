<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 48" role="img" aria-label="KnockKnock.prof logo">

  <!-- Frame / surround -->
  <rect width="40" height="48" rx="6" fill="#1B4332"/>

  <!-- Fanlight (arched transom window above door) -->
  <rect x="6" y="4" width="28" height="10" rx="5" fill="#74C69D"/>

  <!-- Fanlight centre bar -->
  <line x1="20" y1="4" x2="20" y2="14" stroke="#2D6A4F" stroke-width="1.2"/>

  <!-- Door body -->
  <rect x="5" y="15" width="30" height="29" rx="2" fill="#E76F51"/>

  <!-- Upper inset panel -->
  <rect x="9" y="18" width="22" height="10" rx="1.5" fill="#CF6343"/>

  <!-- Lower inset panel -->
  <rect x="9" y="31" width="22" height="10" rx="1.5" fill="#CF6343"/>

  <!-- Door knob -->
  <circle cx="30" cy="37" r="3.2" fill="#FAF7F2"/>
  <circle cx="30" cy="37" r="1.5" fill="#E8D5B7"/>

  <!-- Step -->
  <rect x="2" y="44" width="36" height="3" rx="1.5" fill="#2D6A4F"/>

</svg>
