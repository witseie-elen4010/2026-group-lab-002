<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - KnockKnock.prof</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    .auth-wrapper { min-height: calc(100vh - 75px); display: flex; align-items: center; justify-content: center; }
    .auth-card { width: 100%; max-width: 450px; }
    .requirement { font-size: 13px; }
    .requirement.met { color: #2d5a27; }
    .requirement.unmet { color: #9ca3af; }
  </style>
</head>
<body>

  <header class="topbar p-3 d-flex justify-content-between align-items-center">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <img src="/images/door-logo-transparent.svg" alt="KnockKnock.prof door logo" class="kk-door-logo">
      <div>
        <div class="kk-brand-name">KnockKnock.prof</div>
        <div class="kk-brand-tagline">Open the door to better consultations</div>
      </div>
    </a>
  </header>

  <main class="container-fluid p-4 auth-wrapper">
    <div class="card p-4 auth-card">

      <div class="text-center mb-4">
        <h3 class="fw-bold">Choose a New Password</h3>
      </div>

      <% if (error) { %>
        <div class="alert alert-danger"><%= error %></div>
        <div class="text-center mt-2">
          <a href="/forgot-password" class="text-decoration-none fw-semibold">Request a new reset link</a>
        </div>
      <% } else { %>

        <form action="/reset-password" method="POST" id="reset-form">
          <input type="hidden" name="token" value="<%= token %>">
          <input type="hidden" name="email" value="<%= email %>">

          <div class="mb-3">
            <label for="password" class="form-label fw-semibold">New Password</label>
            <input type="password" class="form-control" id="password" name="password" required autocomplete="new-password">
            <div class="mt-2 ps-1">
              <div class="requirement" id="req-length">&#x25CB; At least 8 characters</div>
              <div class="requirement" id="req-upper">&#x25CB; At least one uppercase letter</div>
              <div class="requirement" id="req-number">&#x25CB; At least one number</div>
            </div>
          </div>

          <div class="mb-4">
            <label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required autocomplete="new-password">
            <div class="mt-1 ps-1">
              <div class="requirement" id="req-match">&#x25CB; Passwords match</div>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2" id="submit-btn">Set New Password</button>
        </form>

        <script>
          const pwdInput = document.getElementById('password');
          const confirmInput = document.getElementById('confirmPassword');
          const reqLength = document.getElementById('req-length');
          const reqUpper = document.getElementById('req-upper');
          const reqNumber = document.getElementById('req-number');
          const reqMatch = document.getElementById('req-match');
          const TICK = '&#x25CF;';
          const CIRCLE = '&#x25CB;';

          function check() {
            const val = pwdInput.value;
            const confirm = confirmInput.value;
            const hasLength = val.length >= 8;
            const hasUpper = /[A-Z]/.test(val);
            const hasNumber = /\d/.test(val);
            const matches = val === confirm && val.length > 0;

            reqLength.innerHTML = (hasLength ? TICK : CIRCLE) + ' At least 8 characters';
            reqLength.className = 'requirement ' + (hasLength ? 'met' : 'unmet');
            reqUpper.innerHTML = (hasUpper ? TICK : CIRCLE) + ' At least one uppercase letter';
            reqUpper.className = 'requirement ' + (hasUpper ? 'met' : 'unmet');
            reqNumber.innerHTML = (hasNumber ? TICK : CIRCLE) + ' At least one number';
            reqNumber.className = 'requirement ' + (hasNumber ? 'met' : 'unmet');
            reqMatch.innerHTML = (matches ? TICK : CIRCLE) + ' Passwords match';
            reqMatch.className = 'requirement ' + (matches ? 'met' : 'unmet');
          }

          pwdInput.addEventListener('input', check);
          confirmInput.addEventListener('input', check);
        </script>

      <% } %>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
