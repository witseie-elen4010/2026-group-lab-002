<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Availability - KnockKnock.prof</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-4 d-flex justify-content-between">
    <span class="navbar-brand">KnockKnock.prof</span>
    <a href="login.html" class="btn btn-outline-light btn-sm">Logout</a>
  </nav>

  <main class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <h1 class="h3 mb-4">Set Availability</h1>
        <section class="card mb-4">
          <div class="card-header">Weekly Availability</div>
          <div class="card-body">
            <form id="availabilityForm" action="/lecturer/availability" method="POST">

              <div class="mb-3">
                <label class="form-label fw-semibold">Available Days</label>
                <div class="d-flex flex-wrap gap-3">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="days" value="Monday" id="mon">
                    <label class="form-check-label" for="mon">Monday</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="days" value="Tuesday" id="tue">
                    <label class="form-check-label" for="tue">Tuesday</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="days" value="Wednesday" id="wed">
                    <label class="form-check-label" for="wed">Wednesday</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="days" value="Thursday" id="thu">
                    <label class="form-check-label" for="thu">Thursday</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="days" value="Friday" id="fri">
                    <label class="form-check-label" for="fri">Friday</label>
                  </div>
                </div>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Availability</button>
                <a href="lecturer-dashboard.html" class="btn btn-outline-secondary">Cancel</a>
              </div>

            </form>
          </div>
        </section>
      </div>
    </div>
  </main>
</body>
</html>
