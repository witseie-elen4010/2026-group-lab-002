<!-- Mobile off-canvas nav for lecturer pages (only used below 768px) -->
<div class="offcanvas offcanvas-start d-md-none" tabindex="-1" id="kkMobileNav" aria-labelledby="kkMobileNavLabel" style="max-width:80vw;">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title fw-bold" id="kkMobileNavLabel" style="color:var(--kk-green);">Menu</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body p-3">
    <a href="/lecturer/dashboard"     class="table-link d-flex align-items-center gap-2 mb-1"><i class="bi bi-house-door"></i> Dashboard</a>
    <a href="/lecturer/consultations" class="table-link d-flex align-items-center gap-2 mb-1"><i class="bi bi-calendar-check me-1"></i>Consultations</a>
    <a href="/lecturer/availability"  class="table-link d-flex align-items-center gap-2 mb-1"><i class="bi bi-clock me-1"></i>Availability</a>
    <a href="/lecturer/courses"       class="table-link d-flex align-items-center gap-2 mb-1"><i class="bi bi-journal-text me-1"></i>My Courses</a>
    <a href="/lecturer/settings"      class="table-link d-flex align-items-center gap-2 mb-1"><i class="bi bi-gear me-1"></i>Settings</a>
    <hr style="border-color:var(--kk-border);margin:1rem 0 0.5rem;">
    <form action="/logout" method="POST">
      <button type="submit" class="table-link w-100 text-start border-0 bg-transparent" style="color:#c0392b;">
        <i class="bi bi-box-arrow-left me-1"></i> Logout
      </button>
    </form>
  </div>
</div>
